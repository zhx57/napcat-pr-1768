# NapCat PR #1768 测试镜像构建 - GitHub Container Registry
# =============================================================================
# 使用方法:
#   1. Fork https://github.com/NapNeko/NapCat-Docker 仓库
#   2. 将本文件放到 fork 仓库的 .github/workflows/ 目录
#   3. 在仓库 Settings -> Actions -> General 中确保 Workflow permissions 为 "Read and write"
#   4. 进入 Actions 页面，选择 "Build PR #1768 Image" 工作流
#   5. 点击 "Run workflow" 即可自动构建并推送到 ghcr.io
#
# 镜像地址: ghcr.io/<你的GitHub用户名>/napcat-docker:pr-1768-e310a57
# =============================================================================
name: Build PR #1768 Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "镜像标签 (默认 pr-1768-e310a57)"
        required: false
        default: "pr-1768-e310a57"
      platforms:
        description: "构建平台 (逗号分隔)"
        required: false
        default: "linux/amd64,linux/arm64"
      pr_branch:
        description: "PR 源码分支"
        required: false
        default: "demo/win-bypass-test-20260416"
      pr_repo:
        description: "PR 源码仓库"
        required: false
        default: "NapNeko/NapCatQQ"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      # ----------------------------------------------------------------------
      # Step 1: Checkout NapCat-Docker 仓库 (获取 Dockerfile, entrypoint.sh, templates)
      # ----------------------------------------------------------------------
      - name: Checkout NapCat-Docker
        uses: actions/checkout@v4

      # ----------------------------------------------------------------------
      # Step 2: Checkout NapCatQQ PR 分支 (获取源码)
      # ----------------------------------------------------------------------
      - name: Checkout NapCatQQ PR branch
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.pr_repo }}
          ref: ${{ inputs.pr_branch }}
          path: napcat-source
          fetch-depth: 0

      # ----------------------------------------------------------------------
      # Step 3: 构建 NapCat.Shell.zip
      # ----------------------------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        working-directory: napcat-source
        run: pnpm install --no-frozen-lockfile

      - name: Build WebUI frontend
        working-directory: napcat-source
        run: pnpm --filter napcat-webui-frontend run build

      - name: Build Shell
        working-directory: napcat-source
        run: pnpm run build:shell

      - name: Build builtin plugin
        working-directory: napcat-source
        run: pnpm --filter napcat-plugin-builtin run build

      - name: Prepare Shell dist
        working-directory: napcat-source
        run: |
          cd packages/napcat-shell/dist
          npm install --omit=dev
          rm -f package-lock.json
          # 打包为 NapCat.Shell.zip (文件在根目录，不带前缀)
          zip -r ../../../../NapCat.Shell.zip .
          cd ../../../../
          ls -lh NapCat.Shell.zip
          # 验证关键文件
          unzip -l NapCat.Shell.zip | grep -E "napcat.mjs|config/napcat.json|package.json